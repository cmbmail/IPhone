spring:
  application:
    name: phonebiz
  datasource:
    url: jdbc:h2:mem:phonebiz;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

phonebiz:
  jwt:
    secret: your-super-secret-key-must-be-at-least-256-bits-long-here
    expiration: 86400000
  lock:
    max-fail-count: 5
    lock-duration-minutes: 30
