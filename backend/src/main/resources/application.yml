spring:
  application:
    name: phonebiz
  datasource:
    url: jdbc:mysql://localhost:3306/phonebiz?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jakarta.persistence.lock.timeout: 5000
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai
server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

phonebiz:
  jwt:
    secret: your-super-secret-key-must-be-at-least-256-bits-long-here
    expiration: 86400000
  lock:
    max-fail-count: 5
    lock-duration-minutes: 30
