spring:
  application:
    name: phonebiz
  datasource:
    url: jdbc:mysql://localhost:3306/phonebiz?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        type:
          enum:
            strategy: string
        jakarta.persistence.lock.timeout: 5000
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai
    property-naming-strategy: SNAKE_CASE
server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

phonebiz:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  lock:
    max-fail-count: 5
    lock-duration-minutes: 30
  cors:
    allowed-origins: "http://192.168.139.161,http://localhost:5173"
  rate-limit:
    max-attempts: 10
    window-seconds: 60
