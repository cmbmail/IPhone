server {
    listen 80;
    server_name 192.168.139.161;

    client_max_body_size 50m;
    client_body_timeout 60s;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    access_log /var/log/nginx/phonebiz-access.log;
    error_log /var/log/nginx/phonebiz-error.log;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self';";
    add_header Referrer-Policy same-origin;

    location / {
        root /home/data/apps/phonebiz/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /phonebiz/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    location /phonebiz/h2-console/ {
        proxy_pass http://127.0.0.1:8080/api/h2-console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cookie_path /api /phonebiz;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /home/data/apps/phonebiz/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        root /home/data/apps/phonebiz/frontend/dist;
        log_not_found off;
        access_log off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
