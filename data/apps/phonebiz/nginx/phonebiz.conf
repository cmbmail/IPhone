server {
    listen 80;
    server_name 192.168.139.161;

    client_max_body_size 50m;
    client_body_timeout 60s;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    access_log /var/log/nginx/phonebiz-access.log;
    error_log /var/log/nginx/phonebiz-error.log;

    location / {
        root /home/data/apps/phonebiz/frontend/dist;
        index index.html;
        if (!-e $request_filename) {
            rewrite ^ /index.html last;
        }
    }

    location /phonebiz/ {
        proxy_pass http://127.0.0.1:8081/phonebiz/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    location /phonebiz/h2-console/ {
        proxy_pass http://127.0.0.1:8081/phonebiz/h2-console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cookie_path /phonebiz /phonebiz;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /home/data/apps/phonebiz/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        root /home/data/apps/phonebiz/frontend/dist;
        log_not_found off;
        access_log off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
