server:
  port: 8081
  servlet:
    context-path: /phonebiz

spring:
  application:
    name: phonebiz
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:phonebiz;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init-h2.sql
      encoding: UTF-8
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cmbchina.phonebiz.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: cmbchina_phonebiz_secret_key_2024
  expiration: 7200

logging:
  level:
    com.cmbchina.phonebiz: debug
