version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: phonebiz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Cmb@123456
      MYSQL_DATABASE: phonebiz
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pCmb@123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phonebiz-network
    user: "999:999"

  redis:
    image: redis:7-alpine
    container_name: phonebiz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phonebiz-network
    user: "999:999"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile-backend
    container_name: phonebiz-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: h2
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "8081:8081"
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - phonebiz-network
    user: "1000:1000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile-frontend
    container_name: phonebiz-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - phonebiz-network
    user: "1000:1000"

volumes:
  mysql_data:
  redis_data:

networks:
  phonebiz-network:
    driver: bridge
