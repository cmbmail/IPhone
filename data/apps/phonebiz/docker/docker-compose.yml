version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: phonebiz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Cmb@123456
      MYSQL_DATABASE: phonebiz
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pCmb@123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phonebiz-network

  redis:
    image: redis:7-alpine
    container_name: phonebiz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phonebiz-network

  backend:
    build:
      context: ../..
      dockerfile: data/apps/phonebiz/docker/Dockerfile-backend
    container_name: phonebiz-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/phonebiz?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Cmb@123456
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - phonebiz-network

  frontend:
    build:
      context: ../..
      dockerfile: data/apps/phonebiz/docker/Dockerfile-frontend
    container_name: phonebiz-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - phonebiz-network

volumes:
  mysql_data:
  redis_data:

networks:
  phonebiz-network:
    driver: bridge
